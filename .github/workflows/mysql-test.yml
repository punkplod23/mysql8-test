name: MySQL Concurrency Test

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to run it manually

jobs:
  test:
    runs-on: ubuntu-latest
    
    # Spin up a temporary MySQL container for this job
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: my_database
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install mysql-connector-python
        
      - name: Run test script
        env:
          DB_HOST: 127.0.0.1
        run: |
          python main.py > report.txt
          cat report.txt # Optional: prints the report to the logs for immediate visibility
        
      - name: Upload performance report
        uses: actions/upload-artifact@v4
        with:
          name: concurrency-report
          path: report.txt